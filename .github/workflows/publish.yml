name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify package.json version matches tag
        # Garde-fou anti-drift tag vs package.json (incident brokk 22/04 ou
        # package.json=0.3.1 restait publie en v0.1.0). Fail-fast avant install.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (=${TAG_VERSION}) != package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Version match OK: ${PKG_VERSION}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@tanfeuille'

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync bragi metadata
        run: npm run sync-bragi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
